<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ARScience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Noto Sans Sinhala', sans-serif;
            width: 100vw;
            height: 100vh;
        }

        /* Camera video feed - fills the whole screen */
        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Canvas overlay on top of video - for drawing AR content */
        #overlay-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Status text to confirm everything is working */
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            color: #00ff88;
            font-size: 16px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 14px;
            border-radius: 8px;
        }

        /* Button to switch between front and back camera */
        #switch-camera-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 20;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Home button to go back to experiment menu (will be used later) */
        #menu-btn {
            position: fixed;
            bottom: 30px;
            left: 20px;
            z-index: 20;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- This video element shows the live camera feed -->
    <video id="camera-feed" autoplay playsinline muted></video>

    <!-- This canvas sits on top of the video - we draw AR overlays here -->
    <canvas id="overlay-canvas"></canvas>

    <!-- Status indicator -->
    <div id="status">Starting camera...</div>

    <!-- Buttons -->
    <button id="switch-camera-btn">Switch Camera</button>
    <button id="menu-btn">Menu</button>

    <script>
        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('overlay-canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        // Which camera is active: 'user' = front camera, 'environment' = back camera
        let currentCamera = 'user';

        // ============================================
        // FUNCTION: Start the camera
        // ============================================
        async function startCamera(facingMode) {
            // Stop any existing camera stream first
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            try {
                // Request camera access from the browser
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: facingMode,  // 'user' = front, 'environment' = back
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 30 }
                    },
                    audio: false  // We don't need microphone
                });

                // Connect the camera stream to the video element
                video.srcObject = stream;

                // Wait for video to actually start playing
                await video.play();

                // Set canvas size to match the video
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                // Update status to show it's working
                status.textContent = 'Camera OK | ' + video.videoWidth + 'x' + video.videoHeight + ' | ' + facingMode;
                status.style.color = '#00ff88';

                console.log('Camera started:', facingMode, video.videoWidth, 'x', video.videoHeight);

            } catch (error) {
                // If camera fails, show the error
                status.textContent = 'Camera ERROR: ' + error.message;
                status.style.color = '#ff4444';
                console.error('Camera error:', error);
            }
        }

        // ============================================
        // FUNCTION: Switch between front and back camera
        // ============================================
        document.getElementById('switch-camera-btn').addEventListener('click', () => {
            currentCamera = (currentCamera === 'user') ? 'environment' : 'user';
            startCamera(currentCamera);
        });

        // ============================================
        // FUNCTION: Animation loop (runs every frame ~30fps)
        // This is where we will draw AR overlays later
        // ============================================
        function animationLoop() {
            // Only draw if video is playing and has dimensions
            if (video.readyState >= 2) {
                // Clear the overlay canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // -----------------------------------------------
                // TEMPORARY TEST: Draw a green circle in the center
                // This proves the overlay canvas is working.
                // We will replace this with AR content later.
                // -----------------------------------------------
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                ctx.beginPath();
                ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Draw crosshair lines
                ctx.beginPath();
                ctx.moveTo(centerX - 20, centerY);
                ctx.lineTo(centerX + 20, centerY);
                ctx.moveTo(centerX, centerY - 20);
                ctx.lineTo(centerX, centerY + 20);
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Draw text
                ctx.font = '14px monospace';
                ctx.fillStyle = '#00ff88';
                ctx.textAlign = 'center';
                ctx.fillText('Overlay working', centerX, centerY + 60);
            }

            // Request next frame (this creates the loop)
            requestAnimationFrame(animationLoop);
        }

        // ============================================
        // START EVERYTHING
        // ============================================
        startCamera(currentCamera);   // Start the front camera
        animationLoop();              // Start the animation loop
    </script>

</body>
</html>
