<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ARScience</title>

    <!-- Load MediaPipe Hands from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #overlay-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            color: #ffaa00;
            font-size: 14px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 14px;
            border-radius: 8px;
            max-width: 90vw;
        }

        #finger-info {
            position: fixed;
            top: 70px;
            left: 20px;
            z-index: 20;
            color: #00ff88;
            font-size: 14px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 14px;
            border-radius: 8px;
        }

        #fps-display {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 20;
            color: #00ccff;
            font-size: 14px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 14px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>

    <div id="status">Loading MediaPipe Hands...</div>
    <div id="finger-info">Finger: waiting...</div>
    <div id="fps-display">FPS: --</div>

    <script>
        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('overlay-canvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const fingerInfoEl = document.getElementById('finger-info');
        const fpsDisplayEl = document.getElementById('fps-display');

        let frameCount = 0;
        let lastFpsTime = performance.now();

        // Store the latest finger tip position
        let fingerTipX = 0;
        let fingerTipY = 0;
        let handDetected = false;

        // ============================================
        // MEDIAPIPE HANDS SETUP
        // ============================================
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.5
        });

        // ============================================
        // HAND DETECTION CALLBACK
        // Runs every time MediaPipe processes a frame
        // ============================================
        hands.onResults((results) => {
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // FPS counter
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fpsDisplayEl.textContent = 'FPS: ' + frameCount;
                frameCount = 0;
                lastFpsTime = now;
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handDetected = true;
                const landmarks = results.multiHandLandmarks[0];

                // ------------------------------------------
                // DRAW HAND SKELETON (connections between landmarks)
                // ------------------------------------------
                const connections = [
                    [0,1],[1,2],[2,3],[3,4],
                    [0,5],[5,6],[6,7],[7,8],
                    [0,9],[9,10],[10,11],[11,12],
                    [0,13],[13,14],[14,15],[15,16],
                    [0,17],[17,18],[18,19],[19,20],
                    [5,9],[9,13],[13,17]
                ];

                ctx.strokeStyle = 'rgba(0, 255, 136, 0.6)';
                ctx.lineWidth = 2;
                connections.forEach(([a, b]) => {
                    const pA = landmarks[a];
                    const pB = landmarks[b];
                    ctx.beginPath();
                    ctx.moveTo(pA.x * canvas.width, pA.y * canvas.height);
                    ctx.lineTo(pB.x * canvas.width, pB.y * canvas.height);
                    ctx.stroke();
                });

                // ------------------------------------------
                // DRAW EACH LANDMARK POINT
                // Finger tips (4,8,12,16,20) are red and bigger
                // ------------------------------------------
                landmarks.forEach((point, index) => {
                    const x = point.x * canvas.width;
                    const y = point.y * canvas.height;
                    const isFingerTip = [4, 8, 12, 16, 20].includes(index);

                    ctx.beginPath();
                    ctx.arc(x, y, isFingerTip ? 8 : 4, 0, Math.PI * 2);
                    ctx.fillStyle = isFingerTip ? '#ff4444' : '#00ff88';
                    ctx.fill();
                });

                // ------------------------------------------
                // HIGHLIGHT INDEX FINGER TIP (Landmark 8)
                // This is our "pendulum bob"
                // ------------------------------------------
                const indexTip = landmarks[8];
                fingerTipX = indexTip.x * canvas.width;
                fingerTipY = indexTip.y * canvas.height;

                // Big orange circle on index finger tip
                ctx.beginPath();
                ctx.arc(fingerTipX, fingerTipY, 16, 0, Math.PI * 2);
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Label
                ctx.font = 'bold 16px monospace';
                ctx.fillStyle = '#ffaa00';
                ctx.textAlign = 'left';
                ctx.fillText('INDEX TIP', fingerTipX + 25, fingerTipY - 10);

                // ------------------------------------------
                // DRAW PENDULUM STRING
                // Pivot = base of index finger (landmark 5)
                // Bob = index finger tip (landmark 8)
                // ------------------------------------------
                const indexMCP = landmarks[5];
                const pivotX = indexMCP.x * canvas.width;
                const pivotY = indexMCP.y * canvas.height;

                // Dashed line from pivot to tip
                ctx.beginPath();
                ctx.moveTo(pivotX, pivotY);
                ctx.lineTo(fingerTipX, fingerTipY);
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Pivot point
                ctx.beginPath();
                ctx.arc(pivotX, pivotY, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#ffaa00';
                ctx.fill();
                ctx.font = '12px monospace';
                ctx.fillText('PIVOT', pivotX + 15, pivotY - 8);

                // Update info display
                fingerInfoEl.textContent =
                    'Finger: (' + Math.round(fingerTipX) + ', ' + Math.round(fingerTipY) + ')';
                fingerInfoEl.style.color = '#00ff88';

                statusEl.textContent = 'Hand detected! Swing your index finger.';
                statusEl.style.color = '#00ff88';

            } else {
                handDetected = false;
                fingerInfoEl.textContent = 'Finger: no hand detected';
                fingerInfoEl.style.color = '#ff4444';
                statusEl.textContent = 'Show your hand to the camera...';
                statusEl.style.color = '#ffaa00';

                ctx.font = '20px sans-serif';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.textAlign = 'center';
                ctx.fillText('Show your hand to the camera', canvas.width / 2, canvas.height / 2);
            }
        });

        // ============================================
        // START CAMERA WITH MEDIAPIPE
        // ============================================
        statusEl.textContent = 'Starting camera + MediaPipe...';

        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 1280,
            height: 720,
            facingMode: 'user'
        });

        camera.start()
            .then(() => {
                statusEl.textContent = 'Camera started. Show your hand...';
                statusEl.style.color = '#ffaa00';
                canvas.width = video.videoWidth || 1280;
                canvas.height = video.videoHeight || 720;
            })
            .catch((err) => {
                statusEl.textContent = 'Camera ERROR: ' + err.message;
                statusEl.style.color = '#ff4444';
            });
    </script>

</body>
</html>
